<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>消防知识答题比赛</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #c0392b 0%, #8e2424 100%);
    min-height: 100vh;
    min-height: 100dvh;
    color: #333;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }
  .container {
    background: #fff;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
    padding: 20px 16px 32px;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  h1 {
    text-align: center;
    color: #c0392b;
    margin: 16px 0 4px;
    font-size: 22px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin-bottom: 18px;
  }
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }
  
  /* 欢迎页 */
  .welcome-form { display: flex; flex-direction: column; gap: 14px; }
  label { font-size: 14px; color: #555; margin-bottom: 6px; display: block; font-weight: 500; }
  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { outline: none; border-color: #c0392b; }
  
  .btn {
    background: linear-gradient(135deg, #c0392b 0%, #8e2424 100%);
    color: white;
    border: none;
    padding: 14px 24px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    min-height: 48px;
    touch-action: manipulation;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #6c757d; }
  .btn-confirm { background: linear-gradient(135deg, #27ae60 0%, #16a085 100%); }
  .btn-small { padding: 10px 16px; font-size: 14px; min-height: 40px; }
  
  .info-box {
    background: #fff8e1;
    border-left: 4px solid #f39c12;
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 13px;
    color: #5d4e37;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  
  /* 答题页 */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: #e0e0e0;
    border-radius: 3px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c0392b 0%, #e74c3c 100%);
    transition: width 0.3s;
  }
  /* 答题页总进度（已完成/总题数） */
  .progress-bar.answered .progress-fill { background: linear-gradient(90deg, #27ae60 0%, #2ecc71 100%); }
  /* 15秒倒计时条 */
  .timer-bar {
    width: 100%;
    height: 8px;
    background: #e0e0e0;
    border-radius: 4px;
    margin-bottom: 12px;
    overflow: hidden;
    position: relative;
  }
  .timer-fill {
    height: 100%;
    background: linear-gradient(90deg, #27ae60 0%, #f39c12 60%, #e74c3c 100%);
    transition: width 0.1s linear;
    width: 100%;
  }
  .timer-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    z-index: 2;
  }
  .timer-text.warning { color: #fff; animation: pulse 0.5s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .question-meta {
    color: #888;
    font-size: 13px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .hard-tag {
    color: #c0392b;
    font-weight: 600;
    background: #fef3c7;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
  }
  .question-text {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 16px;
    color: #2c3e50;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    padding: 14px 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 15px;
    line-height: 1.5;
    min-height: 52px;
    touch-action: manipulation;
    user-select: none;
    position: relative;
  }
  .option.locked { cursor: default; }
  .option.right {
    border-color: #27ae60 !important;
    background: #e8f8ef !important;
  }
  .option.wrong {
    border-color: #e74c3c !important;
    background: #fde8e6 !important;
  }
  .option.missed {
    border-color: #27ae60 !important;
    background: #f0faf4 !important;
    opacity: 0.85;
  }
  .option-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e0e0e0;
    color: #666;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    flex-shrink: 0;
    font-size: 13px;
  }
  .option.right .option-letter { background: #27ae60; color: white; }
  .option.wrong .option-letter { background: #e74c3c; color: white; }
  .option.missed .option-letter { background: #27ae60; color: white; }
  .option-text { flex: 1; padding-top: 3px; }
  .option-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    font-weight: bold;
  }
  .option.right .option-icon { color: #27ae60; }
  .option.wrong .option-icon { color: #e74c3c; }
  .option.missed .option-icon { color: #27ae60; }
  
  /* 答题后反馈区 */
  .feedback {
    margin-top: 14px;
    border-radius: 10px;
    padding: 14px;
    display: none;
    animation: slideUp 0.3s ease;
  }
  .feedback.right { background: #e8f8ef; border: 2px solid #27ae60; }
  .feedback.wrong { background: #fde8e6; border: 2px solid #e74c3c; }
  .feedback-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feedback.right .feedback-title { color: #27ae60; }
  .feedback.wrong .feedback-title { color: #e74c3c; }
  .feedback-explain {
    background: #fff;
    border-left: 3px solid #f39c12;
    padding: 10px 12px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.65;
    color: #5d4e37;
  }
  .feedback-explain b { color: #c0392b; }
  .feedback-correct-answer {
    font-size: 13px;
    color: #555;
    margin-bottom: 8px;
  }
  .feedback-correct-answer .ans {
    color: #27ae60;
    font-weight: 600;
  }
  
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .nav-buttons { 
    display: flex; 
    gap: 10px; 
    margin-top: 16px; 
    position: sticky;
    bottom: 8px;
  }
  .nav-buttons .btn { flex: 1; }
  
  /* 结果页 */
  .result-header {
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    color: white;
    border-radius: 14px;
    padding: 22px 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  .result-header.mid { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); color: #5d4e00; }
  .result-header.low { background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%); }
  .score-big { font-size: 52px; font-weight: 700; margin: 6px 0; line-height: 1; }
  .score-sub { font-size: 14px; opacity: 0.95; }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }
  .stat-item {
    background: #f8f9fa;
    padding: 12px 6px;
    border-radius: 8px;
    text-align: center;
  }
  .stat-label { color: #888; font-size: 12px; margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 600; color: #2c3e50; }
  
  .result-section-title {
    font-size: 15px;
    font-weight: 600;
    color: #555;
    margin: 18px 0 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #f0f0f0;
  }
  
  .review-item {
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
    background: #fff;
  }
  .review-item.wrong { border-color: #e74c3c; background: #fef5f3; }
  .review-item.right { border-color: #27ae60; background: #f0faf4; }
  .review-q {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 10px;
    color: #2c3e50;
    line-height: 1.5;
  }
  .review-status {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    margin-right: 8px;
  }
  .review-item.wrong .review-status { background: #e74c3c; color: white; }
  .review-item.right .review-status { background: #27ae60; color: white; }
  .review-line {
    font-size: 13px;
    line-height: 1.6;
    margin: 6px 0;
    color: #555;
  }
  .review-line b { color: #2c3e50; }
  .review-correct { color: #27ae60; font-weight: 600; }
  .review-wrong { color: #e74c3c; font-weight: 600; }
  .review-explain {
    background: #fff8e1;
    border-left: 3px solid #f39c12;
    padding: 10px 12px;
    margin-top: 10px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.65;
    color: #5d4e37;
  }
  .review-explain b { color: #c0392b; }
  
  .screenshot-hint {
    background: #e8f5e9;
    border: 2px dashed #4caf50;
    padding: 16px;
    border-radius: 10px;
    text-align: center;
    margin: 16px 0;
    color: #2e7d32;
    font-size: 15px;
    line-height: 1.6;
  }
  .screenshot-hint b { color: #c0392b; font-size: 16px; }
  .screenshot-hint .tip {
    display: block;
    font-size: 12px;
    color: #666;
    margin-top: 6px;
  }
  
  .error-msg { color: #e74c3c; font-size: 13px; margin-top: 6px; }
  
  /* 小屏适配 */
  @media (max-width: 480px) {
    .container { padding: 16px 14px 24px; }
    h1 { font-size: 20px; }
    .question-text { font-size: 15px; }
    .option { font-size: 14px; padding: 12px; gap: 10px; }
    .option-letter { width: 26px; height: 26px; font-size: 12px; }
    .option-icon { right: 8px; font-size: 16px; }
    .stats { grid-template-columns: 1fr 1fr; }
    .stats .stat-item:last-child { grid-column: span 2; }
    .score-big { font-size: 44px; }
    .nav-buttons { position: sticky; bottom: 0; padding-bottom: 4px; }
    .nav-buttons .btn { padding: 14px; }
  }

  /* 结果页姓名大字幕 */
  .result-name-card {
    text-align: center;
    padding: 24px 20px 16px;
    background: linear-gradient(135deg, #c0392b 0%, #8e2424 100%);
    color: white;
    margin-bottom: 12px;
    border-radius: 14px 14px 0 0;
    box-shadow: 0 4px 12px rgba(192,57,43,0.25);
  }
  .result-name-label {
    font-size: 13px;
    opacity: 0.9;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .result-name-text {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    word-break: break-all;
    line-height: 1.2;
  }
</style>
</head>
<body>

<div class="container">
  <h1>🔥 消防知识答题比赛</h1>
  <div class="subtitle">灭火器 · 消火栓 · 火灾类型 · 四懂四会</div>
  
  <!-- 屏幕1: 欢迎/输入姓名 -->
  <div id="screen-welcome" class="screen active">
    <div class="info-box">
      📋 <b>答题规则</b><br>
      · 30题题库中随机抽 10 题<br>
      · 4选1单选，每题1分，满分10分<br>
      · 含灭火器/消火栓/火灾分类/灭火器选用<br>
      · 含3道区分度难题<br>
      · <b>每答一题立即反馈对错和解析</b><br>
      · <b>每题限时15秒，超时算错</b>（防搜答案）
      · 同设备同名只能答一次<br>
      · 完成后请<b>截图发给主管</b>
    </div>
    <div class="welcome-form">
      <div>
        <label for="name">队员姓名</label>
        <input type="text" id="name" placeholder="请输入你的姓名" maxlength="20" autocomplete="off">
        <div id="name-error" class="error-msg" style="display:none"></div>
      </div>
      <button class="btn" onclick="startQuiz()">开始答题 →</button>
    </div>
  </div>
  
  <!-- 屏幕2: 答题 -->
  <div id="screen-quiz" class="screen">
    <div class="progress-bar">
      <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
    </div>
    <!-- 15秒倒计时条 -->
    <div class="timer-bar">
      <div id="timer-fill" class="timer-fill"></div>
      <div id="timer-text" class="timer-text">15.0s</div>
    </div>
    <div class="question-meta">
      <span id="question-meta-text">第 1 / 10 题</span>
      <span id="timer">⏱ 总用时 00:00</span>
    </div>
    <div id="question-text" class="question-text"></div>
    <div id="options" class="options"></div>
    
    <!-- 答题后反馈区 -->
    <div id="feedback" class="feedback">
      <div id="feedback-title" class="feedback-title"></div>
      <div id="feedback-correct-answer" class="feedback-correct-answer" style="display:none"></div>
      <div id="feedback-explain" class="feedback-explain"></div>
    </div>
    
    <div class="nav-buttons">
      <button id="btn-prev" class="btn btn-secondary" onclick="prevQuestion()">← 上一题</button>
      <button id="btn-next" class="btn" onclick="nextQuestion()">下一题 →</button>
    </div>
  </div>
  
  <!-- 屏幕3: 结果 -->
  <div id="screen-result" class="screen">
    <!-- 姓名大字幕 — 截图一眼看到是谁 -->
    <div class="result-name-card">
      <div class="result-name-label">参赛队员</div>
      <div id="result-name" class="result-name-text">（待显示）</div>
    </div>

    <div id="result-header" class="result-header">
      <div class="score-sub">你的得分</div>
      <div id="score-big" class="score-big">0</div>
      <div id="score-comment" class="score-sub">分</div>
    </div>
    
    <div class="stats">
      <div class="stat-item">
        <div class="stat-label">答对题数</div>
        <div id="stat-correct" class="stat-value">0/10</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">用时</div>
        <div id="stat-time" class="stat-value">0秒</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">正确率</div>
        <div id="stat-rate" class="stat-value">0%</div>
      </div>
    </div>
    
    <div class="result-section-title">📝 答题解析</div>
    <div id="review-list"></div>
    
    <div class="screenshot-hint">
      📸 <b>请截图发给主管</b>
      <span class="tip">手机：电源键 + 音量下 同时按<br>微信扫码后再截图可直接发送</span>
    </div>
  </div>
</div>

<script>
// ============ v9 题库 - 严格无嵌套引号 ============
// ============ v10 题库 - 消防专业知识 ============
const QUESTIONS = [
  // ===== A. 火灾分类（5题）=====
  {
    q: "根据 GB/T 4208-2017《火灾分类》，A 类火灾指的是？",
    opts: ["固体可燃物火灾（木材、纸张、塑料等）", "液体火灾（汽油、柴油、酒精等）", "气体火灾（天然气、液化气等）", "金属火灾（钾、钠、镁等）"],
    ans: 0, diff: "normal", category: "火灾分类",
    explain: "火灾分类按 GB/T 4208-2017 标准：<b>A类=固体可燃物（木材/纸/塑料）</b>；<b>B类=液体/可熔化固体</b>；<b>C类=气体</b>；<b>D类=金属</b>；<b>E类=带电</b>；<b>F类=烹饪物（厨房油脂）</b>。展厅纸张/PVC/木材起火都是A类。"
  },
  {
    q: "展厅内演示车电池仓起火，符合以下哪类火灾定义？",
    opts: ["A类（固体可燃物）", "B类（液体可燃物）", "E类（带电火灾）", "D类（金属火灾）"],
    ans: 2, diff: "hard", category: "火灾分类",
    explain: "<b>带电火灾=E类</b>，定义是带电设备燃烧的火灾。电池仓带电状态下起火属于E类；但切电后按燃烧物形态可能转为A类（外壳塑料）。<b>判别关键：起火时是否带电</b>。"
  },
  {
    q: "厨房烹饪区油锅起火，符合以下哪类火灾定义？",
    opts: ["A类固体火灾", "B类液体火灾（油脂属可燃液体）", "F类烹饪物火灾（厨房专用分类）", "D类金属火灾"],
    ans: 2, diff: "hard", category: "火灾分类",
    explain: "<b>陷阱题</b>：食用油是可燃液体，按燃烧物形态是B类；但<b>GB/T 4208-2017专门增加了F类=烹饪物火灾</b>，因厨房油脂火灾<b>扑救方法特殊</b>（不能用水、不能用干粉，需用<b>灭火毯覆盖</b>或专用<b>F类灭火剂</b>）。"
  },
  {
    q: "展厅内锂电池起火属于哪类火灾？",
    opts: ["D类金属火灾（锂是金属）", "A类固体火灾（电池外壳是塑料）", "E类带电火灾（电池带电）", "C类气体火灾（电解液气化）"],
    ans: 2, diff: "hard", category: "火灾分类",
    explain: "<b>锂电池起火=E类带电火灾</b>。判断依据：①电池带电状态下起火 ②GB/T 4208未对锂电池单独立类 ③消防实操按「当下主导燃烧物+带电状态」判定，<b>带电=首要属性</b>。<b>门岗正确做法：撤人不救</b>，让专业队处理。"
  },


  // ===== B. 灭火器原理与选用（7题）=====
  {
    q: "展厅岗亭配置的 4kg ABC 干粉灭火器能扑救哪类火灾？",
    opts: ["仅A/B/C类火灾（不可带电）", "A/B/C/E类火灾（带电火灾可用但保持1m距离）", "仅A/B类火灾", "所有火灾均可"],
    ans: 1, diff: "hard", category: "灭火器原理",
    explain: "<b>ABC干粉灭火器适用范围</b>：A（固体）+B（液体）+C（气体）+E（带电）。<b>注意：扑救带电火灾时喷嘴距带电体需保持1m以上</b>。展厅标配的ABC干粉灭火器几乎万能，但<b>不能扑救D类金属火灾</b>（如镁、钠）。"
  },

// ============ 工具函数 ============
function getRecords() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}
function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-result') {
    window.scrollTo(0, 0);
    document.body.scrollTop = 0;
  }
}
function formatTime(sec) {
  if (sec < 60) return sec + '秒';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + '分' + s + '秒';
}

  const existing = records.find(r => r.name === name);
  if (existing) {
    errEl.innerHTML = '⚠️ 该姓名已参与过答题，不能重复作答<br><span style="font-size:11px;color:#888;">（如确需重测，请联系主管清除记录）</span>';
    errEl.style.display = 'block';
    return;
  }
  
  state.name = name;
  state.questions = shuffle(QUESTIONS).slice(0, 10);
  state.answers = new Array(10).fill(null);
  state.answered = new Array(10).fill(false);
  state.timedOut = new Array(10).fill(false);
  state.currentIdx = 0;
  state.startTime = Date.now();
  state.endTime = 0;
  
  errEl.style.display = 'none';
  renderQuestion();
  showScreen('screen-quiz');
  startTimer();
  startCountdown();
  window.scrollTo(0, 0);
}

// ============ 计时器 ============
function startTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    const el = document.getElementById('timer');
    if (el) el.textContent = '⏱ 总用时 ' + m + ':' + s;
  }, 1000);
}
function stopTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

// ============ 15秒倒计时 ============
function startCountdown() {
  stopCountdown();
  state.questionStartTime = Date.now();
  const timerFill = document.getElementById('timer-fill');
  const timerText = document.getElementById('timer-text');
  if (timerFill) timerFill.style.width = '100%';
  if (timerText) {
    timerText.textContent = QUESTION_TIMEOUT.toFixed(1) + 's';
    timerText.classList.remove('warning');
  }
  
  state.countdownInterval = setInterval(() => {
    const elapsed = (Date.now() - state.questionStartTime) / 1000;
    const remaining = Math.max(0, QUESTION_TIMEOUT - elapsed);
    const pct = (remaining / QUESTION_TIMEOUT) * 100;
    
    if (timerFill) timerFill.style.width = pct + '%';
    if (timerText) {
      timerText.textContent = remaining.toFixed(1) + 's';
      if (remaining <= 5) {
        timerText.classList.add('warning');
      } else {
        timerText.classList.remove('warning');
      }
    }
    
    // 超时未答
    if (remaining <= 0) {
      stopCountdown();
      handleTimeout();
    }
  }, 100);
}
function stopCountdown() {
  if (state.countdownInterval) {
    clearInterval(state.countdownInterval);
    state.countdownInterval = null;
  }
}
function handleTimeout() {
  const idx = state.currentIdx;
  if (state.answered[idx]) return; // 已答过不触发
  
  // 标记超时
  state.answered[idx] = true;
  state.timedOut[idx] = true;
  state.answers[idx] = null; // 没作答
  
  // 强烈震动反馈
  if (navigator.vibrate) {
    navigator.vibrate([100, 50, 100, 50, 200]);
  }
  
  // 渲染超时反馈
  renderQuestion();
  
  setTimeout(() => {
    const fb = document.getElementById('feedback');
    if (fb && fb.style.display !== 'none') {
      fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }, 100);
}

// ============ 渲染题目 ============
function renderQuestion() {
  const idx = state.currentIdx;
  const q = state.questions[idx];
  
  document.getElementById('progress-fill').style.width = ((idx + 1) / 10 * 100) + '%';
  
  let metaText = `第 ${idx + 1} / 10 题`;
  if (q.diff === 'hard') {
    metaText += ' <span class="hard-tag">🔥 难题</span>';
  }
  document.getElementById('question-meta-text').innerHTML = metaText;
  
  document.getElementById('question-text').textContent = (idx + 1) + '. ' + q.q;
  
  // 渲染选项
  const optsEl = document.getElementById('options');
  optsEl.innerHTML = '';
  const isAnswered = state.answered[idx];
  const userChoice = state.answers[idx];
  const isTimeout = state.timedOut[idx];
  
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    if (isAnswered) {
      div.classList.add('locked');
      if (i === q.ans) {
        // 正确答案
        div.classList.add(isTimeout ? 'right' : (i === userChoice ? 'right' : 'missed'));
      } else if (i === userChoice) {
        div.classList.add('wrong'); // 选错了
      }
    }
    div.onclick = () => selectOption(i);
    
    let icon = '';
    if (isAnswered) {
      if (i === q.ans) icon = '<span class="option-icon">✓正确答案</span>';
      else if (i === userChoice) icon = '<span class="option-icon">✗</span>';
    }
    
    div.innerHTML = `
      <div class="option-letter">${String.fromCharCode(65 + i)}</div>
      <div class="option-text">${opt}</div>
      ${icon}
    `;
    optsEl.appendChild(div);
  });
  
  // 渲染反馈区
  const feedbackEl = document.getElementById('feedback');
  if (isAnswered) {
    const isRight = isTimeout ? false : (userChoice === q.ans);
    feedbackEl.className = 'feedback ' + (isRight ? 'right' : 'wrong');
    feedbackEl.style.display = 'block';
    
    const titleEl = document.getElementById('feedback-title');
    if (isTimeout) {
      titleEl.innerHTML = '⏰ 超时未答！';
    } else if (isRight) {
      titleEl.innerHTML = '✓ 答对了！';
    } else {
      titleEl.innerHTML = '✗ 答错了';
    }
    
    // 错题才显示正确答案
    const correctEl = document.getElementById('feedback-correct-answer');
    correctEl.style.display = 'block';
    correctEl.innerHTML = `正确答案：<span class="ans">${String.fromCharCode(65 + q.ans)}. ${q.opts[q.ans]}</span>`;
    
    document.getElementById('feedback-explain').innerHTML = '<b>📖 解析：</b>' + q.explain;
  } else {
    feedbackEl.style.display = 'none';
  }
  
  // 按钮状态
  document.getElementById('btn-prev').disabled = (idx === 0);
  const nextBtn = document.getElementById('btn-next');
  if (idx === 9) {
    nextBtn.textContent = '提交答案 ✓';
    nextBtn.className = 'btn btn-confirm';
  } else {
    nextBtn.textContent = '下一题 →';
    nextBtn.className = 'btn';
  }
}

// ============ 选中选项 (立即反馈) ============
function selectOption(optIdx) {
  // 已答过则不能修改
  if (state.answered[state.currentIdx]) return;
  
  // 停止倒计时
  stopCountdown();
  
  state.answers[state.currentIdx] = optIdx;
  state.answered[state.currentIdx] = true;
  
  // 触觉反馈 (手机)
  const q = state.questions[state.currentIdx];
  if (navigator.vibrate) {
    navigator.vibrate(optIdx === q.ans ? [50] : [80, 40, 80]);
  }
  
  renderQuestion();
  
  // 自动滚动到反馈区 (手机端体验更好)
  setTimeout(() => {
    const fb = document.getElementById('feedback');
    if (fb && fb.style.display !== 'none') {
      fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }, 100);
}

function prevQuestion() {
  if (state.currentIdx > 0) {
    state.currentIdx--;
    renderQuestion();
    // 切回未答完的题要重启倒计时
    if (!state.answered[state.currentIdx]) {
      startCountdown();
    }
    window.scrollTo(0, 0);
  }
}

function nextQuestion() {
  if (state.currentIdx === 9) {
    submitQuiz();
  } else {
    state.currentIdx++;
    renderQuestion();
    // 新一题启动倒计时
    if (!state.answered[state.currentIdx]) {
      startCountdown();
    }
    window.scrollTo(0, 0);
  }
}

// ============ 提交 ============
function submitQuiz() {
  // 检查是否全部答完 (包含超时未答)
  const unanswered = state.answered.findIndex(a => !a);
  if (unanswered !== -1) {
    if (!confirm(`第 ${unanswered + 1} 题还没答（如果已超时则已算错），确定提交吗？`)) {
      state.currentIdx = unanswered;
      renderQuestion();
      return;
    }
  }
  
  stopTimer();
  stopCountdown();
  state.endTime = Date.now();
  const timeUsed = Math.round((state.endTime - state.startTime) / 1000);
  const correct = state.answers.reduce((sum, ans, i) => sum + (ans === state.questions[i].ans ? 1 : 0), 0);
  
  const record = {
    name: state.name,
    score: correct,
    total: 10,
    timeUsed: timeUsed,
    timestamp: Date.now()
  };
  const records = getRecords();
  records.push(record);
  saveRecords(records);
  
  renderResult(correct, timeUsed);
  showScreen('screen-result');
}

// ============ 渲染结果 ============
function renderResult(correct, timeUsed) {
  // 显示姓名大字幕
  document.getElementById('result-name').textContent = state.name;
  document.getElementById('score-big').textContent = correct;
  
  const header = document.getElementById('result-header');
  header.className = 'result-header';
  let comment = '';
  if (correct >= 9) { comment = '🏆 太强了！几乎全对'; }
  else if (correct >= 7) { comment = '👏 优秀，掌握得很扎实'; }
  else if (correct >= 5) { comment = '👍 还不错'; }
  else if (correct >= 3) { comment = '💪 需要多学习'; }
  else { comment = '📚 错题解析请仔细看'; }
  document.getElementById('score-comment').textContent = comment;
  if (correct < 7) header.classList.add('mid');
  if (correct < 4) header.classList.add('low');
  
  document.getElementById('stat-correct').textContent = correct + '/10';
  document.getElementById('stat-time').textContent = formatTime(timeUsed);
  document.getElementById('stat-rate').textContent = Math.round(correct / 10 * 100) + '%';
  
  // 答题解析汇总
  const reviewEl = document.getElementById('review-list');
  reviewEl.innerHTML = '';
  
  state.questions.forEach((q, i) => {
    const userAns = state.answers[i];
    const isTimeout = state.timedOut[i];
    const isRight = !isTimeout && userAns === q.ans;
    const item = document.createElement('div');
    item.className = 'review-item ' + (isRight ? 'right' : 'wrong');
    
    const userAnsText = isTimeout ? '⏰ 超时未答' : (userAns === null ? '未作答' : String.fromCharCode(65 + userAns) + '. ' + q.opts[userAns]);
    const correctAnsText = String.fromCharCode(65 + q.ans) + '. ' + q.opts[q.ans];
    
    let statusLabel = isRight ? '✓ 答对' : (isTimeout ? '⏰ 超时' : '✗ 答错');
    
    item.innerHTML = `
      <div class="review-q">
        <span class="review-status">${statusLabel}</span>
        ${i + 1}. ${q.q}${q.diff === 'hard' ? ' <span class="hard-tag">🔥难题</span>' : ''}
      </div>
      ${isRight ? `
        <div class="review-line">你的答案：<span class="review-correct">${userAnsText}</span></div>
      ` : `
        <div class="review-line">你的答案：<span class="review-wrong">${userAnsText}</span></div>
        <div class="review-line">正确答案：<span class="review-correct">${correctAnsText}</span></div>
      `}
      <div class="review-explain">
        <b>📖 解析：</b>${q.explain}
      </div>
    `;
    reviewEl.appendChild(item);
  });
}

// ============ 初始化 ============
document.getElementById('name').addEventListener('keypress', e => {
  if (e.key === 'Enter') startQuiz();
});
document.getElementById('name').addEventListener('input', () => {
  document.getElementById('name-error').style.display = 'none';
});
</script>
