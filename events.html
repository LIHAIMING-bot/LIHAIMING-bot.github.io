<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>华中区特斯拉 · 本月优秀事件</title>
<style>
:root { --bg-page:#f5f5f7; --bg-card:#fff; --border:#e5e5ea; --text-0:#1d1d1f; --text-1:#2c2c2e; --text-2:#6e6e73; --text-3:#98989d; --accent:#e82127; --bg-soft:#f0f0f3; }
* { box-sizing: border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg-page); color:var(--text-1); }
.wrap { max-width: 880px; margin: 0 auto; padding: 24px 20px 60px; }
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.header h1 { margin:0; font-size: 22px; font-weight: 600; color: var(--text-0); }
.header h1::before { content:''; display:inline-block; width:4px; height:18px; background:var(--accent); border-radius:2px; margin-right:10px; vertical-align: -2px; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:8px; border:1px solid #d8d8dd; background:#fff; color:var(--text-1); font-size:13px; text-decoration:none; cursor:pointer; }
.btn:hover { background: var(--bg-soft); }
.section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
.section-title { font-size: 14px; font-weight: 600; color: var(--text-0); margin: 0 0 14px; display:flex; align-items:center; gap:10px; }
.section-title::before { content:''; width:3px; height:14px; background:var(--accent); border-radius:2px; }
.empty { padding: 60px 20px; text-align:center; color: var(--text-3); font-size: 14px; }
.empty .ico { font-size: 40px; margin-bottom: 8px; }
.event-card { background: var(--bg-soft); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
.event-title { font-size: 16px; font-weight: 600; color: var(--text-0); margin-bottom: 6px; }
.event-meta { font-size: 12px; color: var(--text-2); margin-bottom: 12px; }
.event-meta span { margin-right: 14px; }
.event-desc { font-size: 14px; color: var(--text-1); line-height: 1.8; white-space: pre-wrap; margin-bottom: 12px; }
.photos { display:flex; gap: 8px; flex-wrap: wrap; }
.photos img { width: 120px; height: 120px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); }
.photos img:hover { border-color: var(--accent); }
.lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:9999; cursor:zoom-out; }
.lightbox img { max-width: 90%; max-height: 90%; border-radius: 8px; }
footer { text-align:center; font-size: 11px; color: var(--text-3); margin-top: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>本月优秀事件</h1>
    <a class="btn" href="./">← 返回管理面板</a>
  </div>
  <div class="section">
    <div class="section-title">队员好人好事 / 服务案例</div>
    <div id="events"></div>
  </div>
  <footer>华中区特斯拉 · Powered by MiniMax</footer>
</div>
<script>
fetch('data/quiz.json?_=' + Date.now())
  .then(function(r) { return r.ok ? r.json() : { events: [] }; })
  .then(function(d) { render(d.events || []); })
  .catch(function() { render([]); });

function render(events) {
  var box = document.getElementById('events');
  if (!events.length) {
    box.innerHTML = '<div class="empty"><div class="ico">⭐</div>暂无优秀事件</div>';
    return;
  }
  box.innerHTML = events.map(function(e, i) {
    var photos = (e.photos || []).map(function(p, j) {
      return '<img src="' + p + '" alt="照片 ' + (j+1) + '" data-i="' + i + '" data-j="' + j + '">';
    }).join('');
    var people = e.people ? '<span>✉ ' + esc(e.people) + '</span>' : '';
    return '<div class="event-card">' +
      '<div class="event-title">⭐ ' + esc(e.title || '') + '</div>' +
      '<div class="event-meta">' +
        '<span>📍 ' + esc(e.store || '') + '</span>' +
        '<span>🕐 ' + esc(e.date || '') + '</span>' +
        people +
      '</div>' +
      '<div class="event-desc">' + esc(e.description || '') + '</div>' +
      (photos ? '<div class="photos">' + photos + '</div>' : '') +
    '</div>';
  }).join('');
  // lightbox
  box.querySelectorAll('img[data-i]').forEach(function(img) {
    img.onclick = function() {
      var src = img.getAttribute('src');
      var lb = document.createElement('div');
      lb.className = 'lightbox';
      lb.innerHTML = '<img src="' + src + '" alt="">';
      lb.onclick = function() { document.body.removeChild(lb); };
      document.body.appendChild(lb);
    };
  });
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}
</script>
</body>
</html>
